<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 錯題本</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root {
  --purple: #6C63FF;
  --purple-light: #EEF0FF;
  --purple-dark: #4B44CC;
  --green: #22C55E;
  --orange: #F59E0B;
  --red: #EF4444;
  --text: #1a1a2e;
  --text-2: #64748B;
  --text-3: #94A3B8;
  --bg: #F1F5F9;
  --white: #FFFFFF;
  --border: #E2E8F0;
  --shadow: 0 4px 20px rgba(108,99,255,0.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 10px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  min-height:100vh;
  padding:1.25rem 1rem 2rem;
}
.app{width:100%;max-width:430px;margin:0 auto;}
.screen{display:none;}
.screen.active{display:block;}

/* ── 登入頁 ── */
.login-wrap{min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo .icon-wrap{
  width:88px;height:88px;
  background:linear-gradient(135deg,#6C63FF,#A78BFA);
  border-radius:28px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.25rem;
  font-size:42px;
  box-shadow:0 8px 32px rgba(108,99,255,0.35);
}
.login-logo h1{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
.login-logo p{font-size:15px;color:var(--text-2);margin-top:6px;}
.login-card{
  background:var(--white);
  border-radius:var(--radius);
  padding:2rem;
  width:100%;
  box-shadow:var(--shadow);
}
.google-btn{
  width:100%;padding:14px;
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:15px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  color:var(--text);
  transition:all 0.2s;
}
.google-btn:hover{background:#f8f8ff;border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-light);}
.google-logo{width:20px;height:20px;flex-shrink:0;}
.login-note{text-align:center;font-size:12px;color:var(--text-3);margin-top:1rem;}

/* ── 通用元件 ── */
.card{
  background:var(--white);
  border-radius:var(--radius);
  padding:1.5rem;
  box-shadow:var(--shadow-sm);
}
.btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--purple),var(--purple-dark));
  color:white;border:none;
  border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;
  cursor:pointer;
  letter-spacing:0.3px;
  transition:all 0.2s;
  box-shadow:0 4px 14px rgba(108,99,255,0.35);
}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}

.topbar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;}
.back{
  width:38px;height:38px;
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;
  color:var(--text-2);
  transition:all 0.2s;
}
.back:hover{border-color:var(--purple);color:var(--purple);}
.topbar h2{font-size:20px;font-weight:700;color:var(--text);flex:1;}
.topbar .count{
  font-size:12px;font-weight:600;
  background:var(--purple-light);
  color:var(--purple);
  padding:3px 10px;border-radius:99px;
}

/* ── 選科目 ── */
.user-bar{
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,var(--purple),#A78BFA);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:1.5rem;
  color:white;
}
.user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.5);}
.user-name{font-size:15px;font-weight:700;}
.user-email{font-size:12px;opacity:0.8;margin-top:1px;}
.page-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--text-2);margin-bottom:1.25rem;}
.subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.subject-card{
  background:var(--white);
  border:2px solid var(--border);
  border-radius:14px;
  padding:1rem 0.5rem;
  text-align:center;cursor:pointer;
  user-select:none;
  transition:all 0.18s;
}
.subject-card:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 4px 12px rgba(108,99,255,0.12);}
.subject-card.selected{border-color:var(--purple);background:var(--purple-light);transform:translateY(-2px);box-shadow:0 4px 12px rgba(108,99,255,0.15);}
.subject-card .icon{font-size:28px;display:block;margin-bottom:6px;}
.subject-card .label{font-size:13px;font-weight:600;color:var(--text);}
.subject-card.selected .label{color:var(--purple);}
.sel-count{text-align:center;font-size:13px;color:var(--text-2);margin-bottom:1rem;font-weight:500;}

/* ── 儀表板 ── */
.dash-header{
  background:linear-gradient(135deg,var(--purple),#A78BFA);
  border-radius:var(--radius);
  padding:1.5rem;
  margin-bottom:1.25rem;
  color:white;
  position:relative;
  overflow:hidden;
}
.dash-header::after{
  content:'📓';
  position:absolute;right:-10px;top:-10px;
  font-size:90px;opacity:0.12;
  transform:rotate(15deg);
}
.dash-header h2{font-size:20px;font-weight:700;margin-bottom:4px;}
.dash-header p{font-size:13px;opacity:0.85;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{
  background:var(--white);
  border-radius:14px;
  padding:1rem;
  text-align:center;
  box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat:nth-child(1)::before{background:var(--purple);}
.stat:nth-child(2)::before{background:var(--green);}
.stat:nth-child(3)::before{background:var(--orange);}
.stat .lbl{font-size:11px;font-weight:600;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.stat .val{font-size:26px;font-weight:700;color:var(--text);}
.sec-title{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.subj-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;}
.subj-row{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:1rem 1.1rem;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
  transition:all 0.18s;
}
.subj-row:hover{border-color:var(--purple);transform:translateX(3px);box-shadow:var(--shadow-sm);}
.subj-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.subj-name{font-size:15px;font-weight:600;color:var(--text);flex:1;}
.subj-count{font-size:12px;color:var(--text-2);margin-right:4px;}
.arrow{color:var(--text-3);font-size:20px;font-weight:300;}

/* ── 篩選 ── */
.chips{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.chip{
  padding:6px 16px;border-radius:99px;
  font-size:13px;font-weight:500;
  border:1.5px solid var(--border);
  background:var(--white);color:var(--text-2);
  cursor:pointer;transition:all 0.15s;
}
.chip:hover{border-color:var(--purple);color:var(--purple);}
.chip.active{background:var(--purple);border-color:var(--purple);color:white;font-weight:600;box-shadow:0 3px 10px rgba(108,99,255,0.3);}

/* ── 錯題卡 ── */
.card-list{display:flex;flex-direction:column;gap:12px;}
.q-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:1.1rem 1.25rem;
  transition:all 0.18s;
}
.q-card:hover{box-shadow:var(--shadow);border-color:transparent;}
.q-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:0.02em;}
.badge.pending{background:#FFF7ED;color:#C2410C;}
.badge.done{background:#F0FDF4;color:#15803D;}
.q-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.4;}
.q-desc{font-size:13px;color:var(--text-2);line-height:1.6;}
.q-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.q-date{font-size:11px;color:var(--text-3);font-weight:500;}
.q-action{
  font-size:12px;font-weight:600;
  color:var(--purple);
  border:1.5px solid var(--purple);
  border-radius:8px;padding:5px 14px;
  background:transparent;cursor:pointer;
  transition:all 0.15s;
}
.q-action:hover{background:var(--purple);color:white;}
.q-action.done{color:var(--text-3);border-color:var(--border);cursor:default;}
.q-action.done:hover{background:transparent;color:var(--text-3);}

/* ── 輸入頁 ── */
.subj-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--purple-light);color:var(--purple);
  border-radius:99px;padding:7px 18px;
  font-size:14px;font-weight:700;
  margin-bottom:1.25rem;
}
.field{margin-bottom:1.1rem;}
.field label{display:block;font-size:13px;color:var(--text-2);font-weight:600;margin-bottom:7px;}
.field textarea{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:15px;color:var(--text);
  font-family:inherit;resize:vertical;min-height:90px;outline:none;
  background:var(--bg);
  transition:border-color 0.2s;
}
.field textarea:focus{border-color:var(--purple);background:white;box-shadow:0 0 0 3px var(--purple-light);}
#photo-area{
  border:2px dashed var(--border);
  border-radius:14px;padding:1.75rem 1rem;
  text-align:center;cursor:pointer;
  background:var(--bg);
  transition:all 0.2s;
}
#photo-area:hover{border-color:var(--purple);background:var(--purple-light);}

/* ── Shorts 風格列表 ── */
#s-list{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f1a;overflow:hidden;max-width:100%;margin:0;}
#s-list.active{display:block;}
.shorts-topbar{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:10px;
  padding:48px 16px 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
}
.shorts-chips{
  position:absolute;top:100px;left:0;right:0;z-index:10;
  display:flex;gap:8px;padding:0 16px;
  overflow-x:auto;scrollbar-width:none;
}
.shorts-chips::-webkit-scrollbar{display:none;}
.shorts-chips .chip{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.8);
  white-space:nowrap;flex-shrink:0;
}
.shorts-chips .chip.active{
  background:var(--purple);
  border-color:var(--purple);
  color:white;
}
.shorts-container{
  position:absolute;top:0;left:0;right:0;bottom:0;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.shorts-container::-webkit-scrollbar{display:none;}
.shorts-slide{
  height:100vh;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  display:flex;align-items:center;justify-content:center;
  padding:140px 20px 80px;
  position:relative;
}
.shorts-card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;
  padding:1.75rem;
  width:100%;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.shorts-badge{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:99px;padding:5px 14px;
  font-size:12px;font-weight:700;
  margin-bottom:1rem;
}
.shorts-badge.pending{background:rgba(245,158,11,0.2);color:#FCD34D;}
.shorts-badge.done{background:rgba(34,197,94,0.2);color:#86EFAC;}
.shorts-img{width:100%;border-radius:14px;margin-bottom:1rem;max-height:200px;object-fit:contain;}
.shorts-title{font-size:18px;font-weight:700;color:white;line-height:1.4;margin-bottom:10px;}
.shorts-desc{font-size:14px;color:rgba(255,255,255,0.65);line-height:1.7;}
.shorts-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;}
.shorts-date{font-size:12px;color:rgba(255,255,255,0.4);}
.shorts-mark-btn{
  padding:9px 20px;border-radius:99px;
  font-size:13px;font-weight:700;border:none;cursor:pointer;
  transition:all 0.2s;
}
.shorts-mark-btn.pending{background:var(--purple);color:white;box-shadow:0 4px 14px rgba(108,99,255,0.4);}
.shorts-mark-btn.done{background:rgba(34,197,94,0.15);color:#86EFAC;border:1px solid rgba(34,197,94,0.3);}
.shorts-empty{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:rgba(255,255,255,0.4);
  scroll-snap-align:start;
}
.shorts-empty .e-icon{font-size:64px;margin-bottom:1rem;}
.shorts-empty p{font-size:15px;font-weight:500;margin-bottom:1.5rem;}
.shorts-progress{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;z-index:10;
}
.prog-dot{
  width:6px;height:6px;border-radius:99px;
  background:rgba(255,255,255,0.25);
  transition:all 0.3s;
}
.prog-dot.active{background:white;width:20px;}

/* ── Empty ── */
.empty{text-align:center;padding:3.5rem 1rem;color:var(--text-3);}
.empty-icon{font-size:52px;margin-bottom:0.75rem;}
.empty p{font-size:14px;font-weight:500;}

/* ── Toast ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--text);color:white;
  padding:11px 24px;border-radius:99px;
  font-size:14px;font-weight:500;
  opacity:0;pointer-events:none;
  transition:opacity 0.25s;white-space:nowrap;z-index:999;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

<!-- ══ 登入頁 ══ -->
<div id="s-login" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="icon-wrap">📚</div>
      <h1>AI 錯題本</h1>
      <p>記錄錯題，智慧複習</p>
    </div>
    <div class="login-card">
      <button class="google-btn" id="google-login-btn" onclick="loginWithGoogle()">
        <svg class="google-logo" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        使用 Google 帳號登入
      </button>
      <p class="login-note">登入後可儲存你的錯題資料</p>
    </div>
  </div>
</div>

<!-- ══ 選科目 ══ -->
<div id="s-subject" class="screen">
  <div id="user-bar" class="user-bar" style="display:none;">
    <img id="user-avatar" class="user-avatar" src="" alt=""/>
    <div>
      <div class="user-name" id="user-name"></div>
      <div class="user-email" id="user-email"></div>
    </div>
  </div>
  <p class="page-title">選擇科目</p>
  <p class="page-sub">選擇你要追蹤的科目（可多選）</p>
  <div class="subject-grid" id="pick-grid">
    <div class="subject-card" data-name="數學"><span class="icon">📐</span><span class="label">數學</span></div>
    <div class="subject-card" data-name="化學"><span class="icon">⚗️</span><span class="label">化學</span></div>
    <div class="subject-card" data-name="物理"><span class="icon">⚡</span><span class="label">物理</span></div>
    <div class="subject-card" data-name="生物"><span class="icon">🧬</span><span class="label">生物</span></div>
    <div class="subject-card" data-name="國文"><span class="icon">📖</span><span class="label">國文</span></div>
    <div class="subject-card" data-name="英文"><span class="icon">🌐</span><span class="label">英文</span></div>
    <div class="subject-card" data-name="地理"><span class="icon">🗺️</span><span class="label">地理</span></div>
    <div class="subject-card" data-name="歷史"><span class="icon">🏛️</span><span class="label">歷史</span></div>
    <div class="subject-card" data-name="公民"><span class="icon">⚖️</span><span class="label">公民</span></div>
  </div>
  <p class="sel-count" id="sel-count">尚未選擇任何科目</p>
  <button class="btn" onclick="startApp()">開始使用 →</button>
</div>

<!-- ══ 儀表板 ══ -->
<div id="s-dashboard" class="screen">
  <div class="dash-header">
    <h2 id="dash-user-name">我的錯題本 📓</h2>
    <p>點選科目查看錯題</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="lbl">總錯題</div><div class="val" id="d-total">0</div></div>
    <div class="stat"><div class="lbl">已複習</div><div class="val" id="d-done">0</div></div>
    <div class="stat"><div class="lbl">待複習</div><div class="val" id="d-pending">0</div></div>
  </div>
  <div class="sec-title">我的科目</div>
  <div class="subj-list" id="d-subj-list"></div>
  <button class="btn" onclick="goTo('s-pick-for-add')">＋ 新增錯題</button>
</div>

<!-- ══ 選科目（新增時）══ -->
<div id="s-pick-for-add" class="screen">
  <div class="topbar">
    <div class="back" onclick="goTo('s-dashboard')">←</div>
    <h2>選擇科目</h2>
  </div>
  <p style="font-size:14px;color:var(--text-2);margin-bottom:1rem;">這題屬於哪個科目？</p>
  <div class="subj-list" id="add-subj-list"></div>
</div>

<!-- ══ 輸入錯題 ══ -->
<div id="s-add" class="screen">
  <div class="topbar">
    <div class="back" onclick="goTo('s-pick-for-add')">←</div>
    <h2>新增錯題</h2>
  </div>
  <div class="card">
    <div class="subj-badge" id="add-badge">📐 數學</div>
    <div class="field">
      <label>📷 題目照片（可選）</label>
      <div id="photo-area" onclick="document.getElementById('photo-input').click()">
        <div id="photo-placeholder">
          <div style="font-size:36px;margin-bottom:8px;">📸</div>
          <div style="font-size:14px;color:var(--text-2);font-weight:500;">點擊拍照或選擇圖片</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:4px;">支援 JPG、PNG</div>
        </div>
        <img id="photo-preview" src="" alt="預覽" style="display:none;width:100%;border-radius:10px;max-height:220px;object-fit:contain;"/>
      </div>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(this)"/>
      <button id="photo-remove-btn" onclick="removePhoto()" style="display:none;margin-top:8px;width:100%;padding:9px;background:transparent;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-2);cursor:pointer;font-weight:500;">✕ 移除照片</button>
    </div>
    <div class="field">
      <label>📝 題目內容</label>
      <textarea id="add-title" placeholder="寫下題目或考點，例：二次方程式判別式的應用"></textarea>
    </div>
    <div class="field">
      <label>💡 錯誤原因（可選）</label>
      <textarea id="add-desc" placeholder="例：把 b²-4ac 的正負號搞反了"></textarea>
    </div>
    <button class="btn" onclick="saveQ()">儲存錯題</button>
  </div>
</div>

<!-- ══ 錯題列表（Shorts 風格）══ -->
<div id="s-list" class="screen">
  <!-- 頂部浮層 -->
  <div class="shorts-topbar">
    <div class="back" onclick="goTo('s-dashboard')" style="background:rgba(0,0,0,0.4);border:none;color:white;">←</div>
    <div style="flex:1;">
      <div id="list-title" style="font-size:16px;font-weight:700;color:white;"></div>
      <div id="list-count" style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:1px;"></div>
    </div>
    <button onclick="openAdd(curSubject)" style="background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);color:white;border-radius:99px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;">＋ 新增</button>
  </div>

  <!-- 篩選 -->
  <div class="shorts-chips" id="list-chips"></div>

  <!-- 全螢幕卡片容器 -->
  <div class="shorts-container" id="shorts-container"></div>

  <!-- 進度指示 -->
  <div class="shorts-progress" id="shorts-progress"></div>
</div>

</div>
<div id="toast"></div>

<script>
var CLIENT_ID = '454122098066-darscenpm003ajoq5vu5720ir2gocot8.apps.googleusercontent.com';
var currentUser = null;
var mySubjects  = [];
var questions   = [];
var nextId      = 1;
var curSubject  = null;

var META = {
  '數學':{icon:'📐',bg:'#EEF0FF'},
  '化學':{icon:'⚗️', bg:'#FFFBEB'},
  '物理':{icon:'⚡', bg:'#ECFDF5'},
  '生物':{icon:'🧬',bg:'#F0FDF4'},
  '國文':{icon:'📖',bg:'#FFF1F2'},
  '英文':{icon:'🌐',bg:'#EFF6FF'},
  '地理':{icon:'🗺️',bg:'#ECFDF5'},
  '歷史':{icon:'🏛️',bg:'#FFF7ED'},
  '公民':{icon:'⚖️',bg:'#F8FAFC'},
};

function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  if (id === 's-dashboard')    renderDashboard();
  if (id === 's-pick-for-add') renderPickForAdd();
  if (id === 's-list')         renderList();
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function todayStr() {
  var d = new Date();
  return (d.getMonth()+1+'').padStart(2,'0') + '/' + (d.getDate()+'').padStart(2,'0');
}

// ── Google 登入 ──
window.onload = function() {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: onGoogleLogin,
    auto_select: false,
  });
};

function loginWithGoogle() {
  google.accounts.id.prompt(function(notification) {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      google.accounts.id.renderButton(
        document.getElementById('google-login-btn'),
        { theme: 'outline', size: 'large', width: 300 }
      );
    }
  });
}

function onGoogleLogin(response) {
  var payload = parseJwt(response.credential);
  currentUser = { name: payload.name, email: payload.email, avatar: payload.picture };
  document.getElementById('user-name').textContent  = currentUser.name;
  document.getElementById('user-email').textContent = currentUser.email;
  document.getElementById('user-avatar').src        = currentUser.avatar;
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('dash-user-name').textContent = '嗨，' + currentUser.name.split(' ')[0] + ' 👋';
  goTo('s-subject');
}

function parseJwt(token) {
  var base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  var json = decodeURIComponent(atob(base64).split('').map(function(c){
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(json);
}

// ── 選科目 ──
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('#pick-grid .subject-card').forEach(function(card) {
    card.addEventListener('click', function() {
      card.classList.toggle('selected');
      var n = document.querySelectorAll('#pick-grid .subject-card.selected').length;
      document.getElementById('sel-count').textContent =
        n === 0 ? '尚未選擇任何科目' : '已選擇 ' + n + ' 個科目 ✓';
    });
  });
});

function startApp() {
  var cards = document.querySelectorAll('#pick-grid .subject-card.selected');
  if (cards.length === 0) { alert('請至少選擇一個科目'); return; }
  mySubjects = [];
  cards.forEach(function(c){ mySubjects.push(c.dataset.name); });
  goTo('s-dashboard');
}

// ── 儀表板 ──
function renderDashboard() {
  var total = questions.length;
  var done  = questions.filter(function(q){ return q.done; }).length;
  document.getElementById('d-total').textContent   = total;
  document.getElementById('d-done').textContent    = done;
  document.getElementById('d-pending').textContent = total - done;

  var el = document.getElementById('d-subj-list');
  el.innerHTML = '';
  mySubjects.forEach(function(name) {
    var m   = META[name] || {icon:'📚', bg:'#eee'};
    var cnt = questions.filter(function(q){ return q.subject === name; }).length;
    var row = document.createElement('div');
    row.className = 'subj-row';
    row.innerHTML =
      '<div class="subj-icon" style="background:'+m.bg+'">'+m.icon+'</div>'+
      '<div class="subj-name">'+name+'</div>'+
      '<div class="subj-count">'+(cnt===0?'尚無錯題':cnt+' 題')+'</div>'+
      '<div class="arrow">›</div>';
    row.onclick = function(){ curSubject = name; goTo('s-list'); };
    el.appendChild(row);
  });
}

// ── 選科目（新增時）──
function renderPickForAdd() {
  var el = document.getElementById('add-subj-list');
  el.innerHTML = '';
  mySubjects.forEach(function(name) {
    var m   = META[name] || {icon:'📚', bg:'#eee'};
    var row = document.createElement('div');
    row.className = 'subj-row';
    row.innerHTML =
      '<div class="subj-icon" style="background:'+m.bg+'">'+m.icon+'</div>'+
      '<div class="subj-name">'+name+'</div>'+
      '<div class="arrow">›</div>';
    row.onclick = function(){ openAdd(name); };
    el.appendChild(row);
  });
}

function openAdd(name) {
  curSubject = name;
  var m = META[name] || {icon:'📚'};
  document.getElementById('add-badge').textContent = m.icon + ' ' + name;
  document.getElementById('add-title').value = '';
  document.getElementById('add-desc').value  = '';
  removePhoto();
  goTo('s-add');
}

// ── 照片 ──
var currentPhoto = null;

function handlePhoto(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    currentPhoto = e.target.result;
    document.getElementById('photo-placeholder').style.display = 'none';
    document.getElementById('photo-preview').src = currentPhoto;
    document.getElementById('photo-preview').style.display = 'block';
    document.getElementById('photo-remove-btn').style.display = 'block';
    document.getElementById('photo-area').style.border = '2px solid var(--purple)';
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  currentPhoto = null;
  document.getElementById('photo-input').value = '';
  document.getElementById('photo-placeholder').style.display = 'block';
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-preview').src = '';
  document.getElementById('photo-remove-btn').style.display = 'none';
  document.getElementById('photo-area').style.border = '2px dashed var(--border)';
}

// ── 新增錯題 ──
function saveQ() {
  var title = document.getElementById('add-title').value.trim();
  var desc  = document.getElementById('add-desc').value.trim();
  if (!title && !currentPhoto) { alert('請填寫題目內容或上傳照片'); return; }
  questions.push({ id:nextId++, subject:curSubject, title:title||'（照片題目）', desc:desc, photo:currentPhoto, date:todayStr(), done:false });
  removePhoto();
  toast('✅ 已儲存到「' + curSubject + '」！');
  setTimeout(function(){ goTo('s-list'); }, 700);
}

// ── 錯題列表（Shorts 模式）──
var currentFilter = '全部';

function renderList() {
  var list = questions.filter(function(q){ return q.subject === curSubject; });
  document.getElementById('list-title').textContent = curSubject + ' 錯題';
  document.getElementById('list-count').textContent = list.length + ' 題';

  var chips = document.getElementById('list-chips');
  chips.innerHTML = '';
  ['全部','待複習','已複習'].forEach(function(f) {
    var c = document.createElement('div');
    c.className = 'chip' + (f === currentFilter ? ' active' : '');
    c.textContent = f;
    c.onclick = function() {
      currentFilter = f;
      document.querySelectorAll('#list-chips .chip').forEach(function(x){ x.classList.remove('active'); });
      c.classList.add('active');
      renderShorts(list, f);
    };
    chips.appendChild(c);
  });
  renderShorts(list, currentFilter);
}

function renderShorts(list, filter) {
  var show = list;
  if (filter === '待複習') show = list.filter(function(q){ return !q.done; });
  if (filter === '已複習') show = list.filter(function(q){ return  q.done; });

  var container = document.getElementById('shorts-container');
  var progress  = document.getElementById('shorts-progress');
  container.innerHTML = '';
  progress.innerHTML  = '';

  if (show.length === 0) {
    container.innerHTML =
      '<div class="shorts-empty">'+
      '<div class="e-icon">'+(filter==='全部'?'📭':'🎉')+'</div>'+
      '<p>'+(filter==='全部'?'還沒有錯題':'這個分類沒有錯題')+'</p>'+
      '<button onclick="openAdd(curSubject)" style="background:var(--purple);color:white;border:none;border-radius:99px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;">＋ 新增錯題</button>'+
      '</div>';
    return;
  }

  // 進度點
  var maxDots = Math.min(show.length, 7);
  for (var i = 0; i < maxDots; i++) {
    var dot = document.createElement('div');
    dot.className = 'prog-dot' + (i === 0 ? ' active' : '');
    progress.appendChild(dot);
  }

  // 每題一張全螢幕卡
  show.forEach(function(q, idx) {
    var slide = document.createElement('div');
    slide.className = 'shorts-slide';
    slide.dataset.idx = idx;

    var bgColors = ['linear-gradient(160deg,#1a1a3e,#2d1b69)','linear-gradient(160deg,#0f2027,#203a43)','linear-gradient(160deg,#1a1a2e,#16213e)','linear-gradient(160deg,#0d0d2b,#1a0533)'];
    slide.style.background = bgColors[idx % bgColors.length];

    slide.innerHTML =
      '<div class="shorts-card">'+
        '<div class="shorts-badge '+(q.done?'done':'pending')+'">'+(q.done?'✓ 已複習':'⏳ 待複習')+'</div>'+
        (q.photo?'<img class="shorts-img" src="'+q.photo+'" alt="題目圖片"/>':'')+
        '<div class="shorts-title">'+q.title+'</div>'+
        (q.desc?'<div class="shorts-desc">'+q.desc+'</div>':'')+
        '<div class="shorts-footer">'+
          '<span class="shorts-date">📅 '+q.date+'</span>'+
          '<button class="shorts-mark-btn '+(q.done?'done':'pending')+'" data-qid="'+q.id+'">'+(q.done?'✓ 已複習':'標記已複習')+'</button>'+
        '</div>'+
      '</div>';

    // 標記已複習按鈕
    slide.querySelector('.shorts-mark-btn').addEventListener('click', function() {
      if (q.done) return;
      q.done = true;
      vibrate([30]);
      this.textContent = '✓ 已複習';
      this.className = 'shorts-mark-btn done';
      slide.querySelector('.shorts-badge').textContent = '✓ 已複習';
      slide.querySelector('.shorts-badge').className = 'shorts-badge done';
      toast('✅ 已標記為複習完成！');
    });

    container.appendChild(slide);
  });

  // 滑動時震動 + 更新進度點
  var lastIdx = 0;
  container.addEventListener('scroll', function() {
    var slideH = container.clientHeight;
    var idx = Math.round(container.scrollTop / slideH);
    if (idx !== lastIdx) {
      vibrate([15]);
      lastIdx = idx;
      // 更新進度點
      var dots = progress.querySelectorAll('.prog-dot');
      dots.forEach(function(d, i){ d.classList.toggle('active', i === Math.min(idx, maxDots-1)); });
    }
  });
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ── 每24小時重置 ──
function checkDailyReset() {
  var last = localStorage.getItem('lastReset');
  var now  = Date.now();
  if (!last || now - parseInt(last) >= 24*60*60*1000) {
    var count = 0;
    questions.forEach(function(q){ if(q.done){ q.done=false; count++; } });
    localStorage.setItem('lastReset', now.toString());
    if (count > 0) toast('🔄 已將 '+count+' 題重置為待複習！');
  }
}
setInterval(checkDailyReset, 60*1000);
</script>
</body>
</html>
