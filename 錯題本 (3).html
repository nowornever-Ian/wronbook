<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>AI 錯題本</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root{
  --purple:#6C63FF;--purple-light:#EEF0FF;--purple-dark:#4B44CC;
  --green:#22C55E;--orange:#F59E0B;
  --text:#1a1a2e;--text-2:#64748B;--text-3:#94A3B8;
  --bg:#F1F5F9;--white:#F8FAFC;--border:#E8EDF2;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);min-height:100vh;padding:1.25rem 1rem 2rem;}
.app{width:100%;max-width:430px;margin:0 auto;}
.screen{display:none;}
.screen.active{display:block;}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;touch-action:manipulation;}
.card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;}
.back{width:42px;height:42px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text-2);touch-action:manipulation;flex-shrink:0;}
.topbar h2{font-size:20px;font-weight:700;color:var(--text);flex:1;}

/* 表情符號選擇器 */
.emoji-pick{background:var(--white);border:2px solid var(--border);border-radius:10px;padding:0.6rem 0;text-align:center;font-size:22px;cursor:pointer;touch-action:manipulation;}
.emoji-pick.selected{border-color:var(--purple);background:var(--purple-light);}

/* 科目格 */
.subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.subject-card{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:1rem 0.5rem;text-align:center;cursor:pointer;touch-action:manipulation;user-select:none;}
.subject-card.selected{border-color:var(--purple);background:var(--purple-light);}
.subject-card .icon{font-size:28px;display:block;margin-bottom:6px;}
.subject-card .label{font-size:13px;font-weight:600;color:var(--text);}
.subject-card.selected .label{color:var(--purple);}
.sel-count{text-align:center;font-size:13px;color:var(--text-2);margin-bottom:1rem;}

/* 儀表板 */
.dash-header{background:linear-gradient(135deg,var(--purple),#A78BFA);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.25rem;color:white;}
.dash-header h2{font-size:20px;font-weight:700;margin-bottom:4px;}
.dash-header p{font-size:13px;opacity:0.85;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:var(--white);border-radius:14px;padding:1rem;text-align:center;}
.stat .lbl{font-size:11px;font-weight:600;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;}
.stat .val{font-size:26px;font-weight:700;color:var(--text);}
.sec-title{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.subj-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;}
.subj-row{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:0.9rem 1.1rem;display:flex;align-items:center;gap:12px;cursor:pointer;touch-action:manipulation;}
.subj-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.subj-name{font-size:15px;font-weight:600;color:var(--text);flex:1;}
.subj-count{font-size:12px;color:var(--text-2);}
.arrow{color:var(--text-3);font-size:20px;}

/* 篩選 */
.chips{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.chip{padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--text-2);cursor:pointer;touch-action:manipulation;}
.chip.active{background:var(--purple);border-color:var(--purple);color:white;}

/* 錯題卡 */
.card-list{display:flex;flex-direction:column;gap:12px;}
.q-card{background:#EEF2F7;border:1.5px solid #E2E8F0;border-radius:var(--radius);padding:1.1rem 1.25rem;}
.badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;display:inline-block;margin-bottom:8px;}
.badge.pending{background:#FFF7ED;color:#C2410C;}
.badge.done{background:#F0FDF4;color:#15803D;}
.q-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.4;}
.q-desc{font-size:13px;color:var(--text-2);line-height:1.6;}
.q-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.q-date{font-size:11px;color:var(--text-3);}
.q-action{font-size:13px;font-weight:600;color:var(--purple);border:1.5px solid var(--purple);border-radius:8px;padding:7px 16px;background:transparent;cursor:pointer;touch-action:manipulation;}
.q-action.done{color:var(--text-3);border-color:var(--border);}

/* 輸入 */
.subj-badge{display:inline-flex;align-items:center;gap:8px;background:var(--purple-light);color:var(--purple);border-radius:99px;padding:7px 18px;font-size:14px;font-weight:700;margin-bottom:1.25rem;}
.field{margin-bottom:1.1rem;}
.field label{display:block;font-size:13px;color:var(--text-2);font-weight:600;margin-bottom:7px;}
.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:var(--text);font-family:inherit;resize:vertical;min-height:90px;outline:none;background:var(--bg);}
.field textarea:focus{border-color:var(--purple);background:white;}
#photo-area{border:2px dashed var(--border);border-radius:14px;padding:2rem 1rem;text-align:center;cursor:pointer;background:var(--bg);touch-action:manipulation;}

/* ══ SHORTS ══ */
#s-list{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:#0a0a1a;z-index:999;
  display:none;overflow:hidden;
}
#s-list.active{display:block;}

.shorts-topbar{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:10px;
  padding:50px 16px 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
}
.shorts-back{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,0.15);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0;}
.shorts-topbar-info{flex:1;}
.shorts-topbar-info h3{font-size:16px;font-weight:700;color:white;}
.shorts-topbar-info p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}
.shorts-add-btn{background:rgba(108,99,255,0.8);border:none;color:white;border-radius:99px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap;}

.shorts-chips{
  position:absolute;top:108px;left:0;right:0;z-index:10;
  display:flex;gap:8px;padding:0 16px;
  overflow-x:auto;scrollbar-width:none;
}
.shorts-chips::-webkit-scrollbar{display:none;}
.shorts-chip{padding:6px 14px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation;}
.shorts-chip.active{background:var(--purple);border-color:var(--purple);color:white;}

#shorts-scroll{
  width:100%;height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#shorts-scroll::-webkit-scrollbar{display:none;}

.slide{
  width:100%;height:100vh;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  display:flex;align-items:center;justify-content:center;
  padding:160px 20px 80px;
  position:relative;
  background-attachment:local;
  isolation:isolate;
}

.slide-card{
  width:100%;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;
  padding:1.75rem;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.slide-num{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:10px;font-weight:600;}
.slide-badge{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;margin-bottom:12px;}
.slide-badge.pending{background:rgba(245,158,11,0.2);color:#FCD34D;}
.slide-badge.done{background:rgba(34,197,94,0.2);color:#86EFAC;}
.slide-img{width:100%;border-radius:14px;margin-bottom:12px;max-height:200px;object-fit:contain;}
.slide-title{font-size:18px;font-weight:700;color:white;line-height:1.45;margin-bottom:8px;}
.slide-desc{font-size:14px;color:rgba(255,255,255,0.6);line-height:1.7;}
.slide-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;}
.slide-date{font-size:12px;color:rgba(255,255,255,0.35);}
.slide-mark{padding:10px 22px;border-radius:99px;font-size:13px;font-weight:700;border:none;cursor:pointer;touch-action:manipulation;}
.slide-mark.pending{background:var(--purple);color:white;box-shadow:0 4px 14px rgba(108,99,255,0.5);}
.slide-mark.done{background:rgba(34,197,94,0.15);color:#86EFAC;border:1px solid rgba(34,197,94,0.3);}

.slide-empty{
  width:100%;height:100vh;
  scroll-snap-align:start;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:rgba(255,255,255,0.4);
  padding:2rem;text-align:center;
}
.slide-empty .e-icon{font-size:64px;margin-bottom:1rem;}
.slide-empty p{font-size:15px;font-weight:500;margin-bottom:1.5rem;}
.slide-empty-btn{background:var(--purple);color:white;border:none;border-radius:99px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation;}

/* 進度點 */
.progress-dots{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;z-index:10;
  pointer-events:none;
}
.pdot{width:6px;height:6px;border-radius:99px;background:rgba(255,255,255,0.25);transition:all 0.3s;}
.pdot.active{background:white;width:20px;}

/* 登入按鈕 */
.login-btn{display:flex;align-items:center;gap:6px;background:white;border:1.5px solid var(--border);border-radius:99px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;touch-action:manipulation;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.login-btn img{width:20px;height:20px;border-radius:50%;object-fit:cover;}
.login-btn-dark{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);color:white;}

/* Toast */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:white;padding:11px 24px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:opacity 0.25s;white-space:nowrap;z-index:99999;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

<!-- ══ 儀表板 ══ -->
<div id="s-dashboard" class="screen active">
  <div class="dash-header">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
      <div>
        <h2 id="dash-title">我的錯題本 📓</h2>
        <p>點選科目查看錯題</p>
      </div>
      <button class="login-btn login-btn-dark" id="dash-login-btn" onclick="doLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        登入
      </button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="lbl">總錯題</div><div class="val" id="d-total">0</div></div>
    <div class="stat"><div class="lbl">已複習</div><div class="val" id="d-done">0</div></div>
    <div class="stat"><div class="lbl">待複習</div><div class="val" id="d-pending">0</div></div>
  </div>
  <div class="sec-title">我的科目</div>
  <div class="subj-list" id="d-subj-list"></div>
  <button class="btn" style="background:transparent;color:var(--purple);border:1.5px dashed var(--purple);box-shadow:none;" onclick="goTo('s-new-subject')">＋ 新增科目</button>
  <button class="btn" onclick="goTo('s-pick-for-add')" style="margin-top:10px;">📝 新增錯題</button>
</div>

<!-- ══ 新增科目 ══ -->
<div id="s-new-subject" class="screen">
  <div class="topbar">
    <div class="back" onclick="goTo('s-dashboard')">←</div>
    <h2>新增科目</h2>
  </div>
  <div class="card">
    <div class="field">
      <label>科目名稱</label>
      <input type="text" id="new-subj-name" placeholder="例：數學" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:var(--text);font-family:inherit;outline:none;background:var(--bg);"/>
    </div>
    <div class="field">
      <label>選擇表情符號</label>
      <div id="emoji-grid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;">
        <div class="emoji-pick selected" onclick="pickEmoji(this)">📐</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">⚗️</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">⚡</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🧬</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">📖</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🌐</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🗺️</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🏛️</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">⚖️</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🎨</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🎵</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">💻</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🏃</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">💰</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🧠</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">🔬</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">📊</div>
        <div class="emoji-pick" onclick="pickEmoji(this)">✏️</div>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:13px;color:var(--text-2);">已選擇：</span>
        <span id="emoji-preview" style="font-size:24px;">📐</span>
        <input type="text" id="custom-emoji" placeholder="或貼上自訂表情符號" style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:var(--bg);" oninput="customEmojiInput(this)"/>
      </div>
    </div>
    <button class="btn" onclick="createSubject()">建立科目</button>
  </div>
</div>

<!-- ══ 選科目（新增）══ -->
<div id="s-pick-for-add" class="screen">
  <div class="topbar">
    <div class="back" onclick="goTo('s-dashboard')">←</div>
    <h2>選擇科目</h2>
  </div>
  <p style="font-size:14px;color:var(--text-2);margin-bottom:1rem;">這題屬於哪個科目？</p>
  <div class="subj-list" id="add-subj-list"></div>
</div>

<!-- ══ 輸入錯題 ══ -->
<div id="s-add" class="screen">
  <div class="topbar">
    <div class="back" onclick="goTo('s-pick-for-add')">←</div>
    <h2>新增錯題</h2>
  </div>
  <div class="card">
    <div class="subj-badge" id="add-badge">📐 數學</div>
    <div class="field">
      <label>📷 題目照片（可選）</label>
      <div id="photo-area" onclick="document.getElementById('photo-input').click()">
        <div id="photo-placeholder">
          <div style="font-size:36px;margin-bottom:8px;">📸</div>
          <div style="font-size:14px;color:var(--text-2);font-weight:500;">點擊拍照或選擇圖片</div>
        </div>
        <img id="photo-preview" src="" alt="" style="display:none;width:100%;border-radius:10px;max-height:220px;object-fit:contain;"/>
      </div>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(this)"/>
      <button id="photo-remove-btn" onclick="removePhoto()" style="display:none;margin-top:8px;width:100%;padding:10px;background:transparent;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-2);cursor:pointer;">✕ 移除照片</button>
    </div>
    <div class="field">
      <label>📝 題目內容</label>
      <textarea id="add-title" placeholder="寫下題目或考點"></textarea>
    </div>
    <div class="field">
      <label>💡 錯誤原因（可選）</label>
      <textarea id="add-desc" placeholder="例：把正負號搞反了"></textarea>
    </div>
    <button class="btn" onclick="saveQ()">儲存錯題</button>
  </div>
</div>

<!-- ══ 錯題列表 ══ -->
<div id="s-list" class="screen">
  <div class="topbar">
    <div class="back" onclick="goTo('s-dashboard')">←</div>
    <h2 id="list-title">錯題</h2>
    <span id="list-count" style="font-size:12px;font-weight:600;background:var(--purple-light);color:var(--purple);padding:3px 10px;border-radius:99px;"></span>
    <button onclick="openShorts()" style="background:linear-gradient(135deg,#1a1a2e,#2d1b69);color:white;border:none;border-radius:99px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap;">▶ Shorts</button>
  </div>
  <div class="chips" id="list-chips"></div>
  <div class="card-list" id="list-cards"></div>
  <button class="btn" onclick="openAdd(curSubject)" style="margin-top:1.25rem;">＋ 新增這科錯題</button>
</div>

<!-- ══ SHORTS 全螢幕 ══ -->
<div id="s-shorts" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0a0a1a;z-index:999;overflow:hidden;">
  <div class="shorts-topbar">
    <button class="shorts-back" onclick="closeShorts()">←</button>
    <div class="shorts-topbar-info">
      <h3 id="shorts-title">Shorts</h3>
      <p id="shorts-count"></p>
    </div>
    <button class="shorts-add-btn" onclick="openAdd(curSubject)">＋ 新增</button>
  </div>
  <div class="shorts-chips" id="shorts-chips"></div>
  <div id="shorts-scroll"></div>
  <div class="progress-dots" id="progress-dots"></div>
</div>

</div>
<div id="toast"></div>

<script>
var mySubjects   = [];   // [{name, icon, bg}]
var questions    = [];
var nextId       = 1;
var curSubject   = null;
var curFilter    = '全部';
var currentPhoto = null;
var selectedEmoji = '📐';

var BGPOOL = ['#EEF0FF','#FFFBEB','#ECFDF5','#F0FDF4','#FFF1F2','#EFF6FF','#FFF7ED','#F8FAFC','#F3E8FF','#FCE7F3'];
var bgIdx = 0;

function getMeta(name) {
  var s = mySubjects.find(function(x){ return x.name === name; });
  return s ? {icon:s.icon, bg:s.bg} : {icon:'📚', bg:'#eee'};
}

// 每張 slide 的「主色」，下一張的頂部 = 這張的底部，形成連續漸層
var COLORLIST = [
  '#1a1a3e', '#2d1b69', '#0f2027', '#1a0533',
  '#0a2818', '#2a1500', '#00142a', '#1a0a1a',
];

function getSlideGradient(idx) {
  var top    = COLORLIST[idx % COLORLIST.length];
  var bottom = COLORLIST[(idx + 1) % COLORLIST.length];
  return 'linear-gradient(180deg,' + top + ' 0%,' + bottom + ' 100%)';
}

function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('s-shorts').style.display = 'none';
  document.body.style.overflow = '';
  document.getElementById(id).classList.add('active');
  if (id==='s-dashboard')     renderDashboard();
  if (id==='s-pick-for-add')  renderPickForAdd();
  if (id==='s-list')          renderList();
  if (id==='s-new-subject')   resetNewSubjectForm();
}

function openShorts() {
  var list = getFilteredList();
  if (list.length === 0) { toast('這個分類沒有錯題'); return; }
  document.getElementById('s-shorts').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderShorts(list);
}

function closeShorts() {
  document.getElementById('s-shorts').style.display = 'none';
  document.body.style.overflow = '';
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function todayStr() {
  var d = new Date();
  return (d.getMonth()+1+'').padStart(2,'0')+'/'+(d.getDate()+'').padStart(2,'0');
}

function vib(ms) { try { if(navigator.vibrate) navigator.vibrate(ms); } catch(e){} }

// ── 新增科目 ──
function resetNewSubjectForm() {
  document.getElementById('new-subj-name').value = '';
  document.getElementById('custom-emoji').value = '';
  selectedEmoji = '📐';
  document.querySelectorAll('.emoji-pick').forEach(function(e, i){ e.classList.toggle('selected', i===0); });
  document.getElementById('emoji-preview').textContent = selectedEmoji;
}

function pickEmoji(el) {
  document.querySelectorAll('.emoji-pick').forEach(function(e){ e.classList.remove('selected'); });
  el.classList.add('selected');
  selectedEmoji = el.textContent;
  document.getElementById('emoji-preview').textContent = selectedEmoji;
  document.getElementById('custom-emoji').value = '';
}

function customEmojiInput(input) {
  var val = input.value.trim();
  if (val) {
    document.querySelectorAll('.emoji-pick').forEach(function(e){ e.classList.remove('selected'); });
    selectedEmoji = val;
    document.getElementById('emoji-preview').textContent = selectedEmoji;
  }
}

function createSubject() {
  var name = document.getElementById('new-subj-name').value.trim();
  if (!name) { alert('請輸入科目名稱'); return; }
  if (mySubjects.find(function(s){ return s.name === name; })) { alert('這個科目已經存在了'); return; }
  var bg = BGPOOL[bgIdx % BGPOOL.length];
  bgIdx++;
  mySubjects.push({ name: name, icon: selectedEmoji, bg: bg });
  toast('✅ 已新增科目「'+name+'」！');
  goTo('s-dashboard');
}

// ── 儀表板 ──

function renderDashboard() {
  var total = questions.length;
  var done  = questions.filter(function(q){ return q.done; }).length;
  document.getElementById('d-total').textContent   = total;
  document.getElementById('d-done').textContent    = done;
  document.getElementById('d-pending').textContent = total-done;
  var el = document.getElementById('d-subj-list');
  el.innerHTML = '';
  if (mySubjects.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:2rem 1rem;color:var(--text-3);"><div style="font-size:40px;margin-bottom:0.5rem;">📚</div><p style="font-size:14px;">還沒有科目，點下方新增一個！</p></div>';
    return;
  }
  mySubjects.forEach(function(s) {
    var name = s.name;
    var cnt = questions.filter(function(q){ return q.subject===name; }).length;
    var row = document.createElement('div');
    row.className = 'subj-row';
    row.innerHTML = '<div class="subj-icon" style="background:'+s.bg+'">'+s.icon+'</div><div class="subj-name">'+name+'</div><div class="subj-count">'+(cnt===0?'尚無錯題':cnt+' 題')+'</div><div class="arrow">›</div>';
    row.onclick = function(){ curSubject=name; curFilter='全部'; goTo('s-list'); };
    el.appendChild(row);
  });
}

// ── 選科目（新增）──
function renderPickForAdd() {
  var el = document.getElementById('add-subj-list');
  el.innerHTML = '';
  if (mySubjects.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:2rem 1rem;color:var(--text-3);"><p style="font-size:14px;">請先到首頁新增科目</p></div>';
    return;
  }
  mySubjects.forEach(function(s) {
    var name = s.name;
    var row = document.createElement('div');
    row.className = 'subj-row';
    row.innerHTML = '<div class="subj-icon" style="background:'+s.bg+'">'+s.icon+'</div><div class="subj-name">'+name+'</div><div class="arrow">›</div>';
    row.onclick = function(){ openAdd(name); };
    el.appendChild(row);
  });
}

function openAdd(name) {
  curSubject = name;
  var m = getMeta(name);
  document.getElementById('add-badge').textContent = m.icon+' '+name;
  document.getElementById('add-title').value = '';
  document.getElementById('add-desc').value  = '';
  removePhoto();
  goTo('s-add');
}

// ── 照片 ──
function handlePhoto(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    currentPhoto = e.target.result;
    document.getElementById('photo-placeholder').style.display = 'none';
    document.getElementById('photo-preview').src = currentPhoto;
    document.getElementById('photo-preview').style.display = 'block';
    document.getElementById('photo-remove-btn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  currentPhoto = null;
  document.getElementById('photo-input').value = '';
  document.getElementById('photo-placeholder').style.display = 'block';
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-preview').src = '';
  document.getElementById('photo-remove-btn').style.display = 'none';
}

// ── 儲存 ──
function saveQ() {
  var title = document.getElementById('add-title').value.trim();
  var desc  = document.getElementById('add-desc').value.trim();
  if (!title && !currentPhoto){ alert('請填寫題目內容或上傳照片'); return; }
  questions.push({id:nextId++,subject:curSubject,title:title||'（照片題目）',desc:desc,photo:currentPhoto,date:todayStr(),done:false});
  removePhoto();
  toast('✅ 已儲存到「'+curSubject+'」！');
  setTimeout(function(){ goTo('s-list'); }, 700);
}

// ── 錯題列表（卡片）──
function renderList() {
  var list = questions.filter(function(q){ return q.subject===curSubject; });
  document.getElementById('list-title').textContent = curSubject+' 錯題';
  document.getElementById('list-count').textContent = list.length+' 題';
  var chips = document.getElementById('list-chips');
  chips.innerHTML = '';
  ['全部','待複習','已複習'].forEach(function(f) {
    var c = document.createElement('div');
    c.className = 'chip'+(f===curFilter?' active':'');
    c.textContent = f;
    c.onclick = function(){
      curFilter = f;
      chips.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('active'); });
      c.classList.add('active');
      renderCards(list);
    };
    chips.appendChild(c);
  });
  renderCards(list);
}

function getFilteredList() {
  var list = questions.filter(function(q){ return q.subject===curSubject; });
  if (curFilter==='待複習') return list.filter(function(q){ return !q.done; });
  if (curFilter==='已複習') return list.filter(function(q){ return  q.done; });
  return list;
}

function renderCards(list) {
  var show = list;
  if (curFilter==='待複習') show = list.filter(function(q){ return !q.done; });
  if (curFilter==='已複習') show = list.filter(function(q){ return  q.done; });
  var el = document.getElementById('list-cards');
  el.innerHTML = '';
  if (show.length===0) {
    el.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:var(--text-3);"><div style="font-size:48px;margin-bottom:0.75rem;">'+(curFilter==='全部'?'📭':'🎉')+'</div><p style="font-size:14px;font-weight:500;">'+(curFilter==='全部'?'還沒有錯題，點下方新增！':'這個分類沒有錯題')+'</p></div>';
    return;
  }
  show.forEach(function(q) {
    var card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML =
      '<span class="badge '+(q.done?'done':'pending')+'">'+(q.done?'✓ 已複習':'⏳ 待複習')+'</span>'+
      (q.photo?'<img src="'+q.photo+'" style="width:100%;border-radius:10px;margin:8px 0;max-height:160px;object-fit:contain;display:block;"/>':'')+
      '<div class="q-title">'+q.title+'</div>'+
      (q.desc?'<div class="q-desc" style="margin-top:5px;">'+q.desc+'</div>':'')+
      '<div class="q-footer"><span class="q-date">📅 '+q.date+'</span>'+
      '<button class="q-action'+(q.done?' done':'')+'">'+(q.done?'已完成':'標記已複習')+'</button></div>';
    if (!q.done) {
      card.querySelector('.q-action').onclick = function() {
        q.done = true;
        toast('✅ 已標記完成！');
        renderCards(questions.filter(function(x){ return x.subject===curSubject; }));
      };
    }
    el.appendChild(card);
  });
}

// ── SHORTS 模式 ──
function renderShorts(show) {
  var scroll = document.getElementById('shorts-scroll');
  var dots   = document.getElementById('progress-dots');
  var chips  = document.getElementById('shorts-chips');
  scroll.innerHTML = '';
  dots.innerHTML   = '';
  chips.innerHTML  = '';

  document.getElementById('shorts-title').textContent = curSubject+' Shorts';
  document.getElementById('shorts-count').textContent = show.length+' 題';

  ['全部','待複習','已複習'].forEach(function(f) {
    var c = document.createElement('div');
    c.className = 'shorts-chip'+(f===curFilter?' active':'');
    c.textContent = f;
    c.onclick = function(){
      curFilter = f;
      chips.querySelectorAll('.shorts-chip').forEach(function(x){ x.classList.remove('active'); });
      c.classList.add('active');
      renderShorts(getFilteredList());
    };
    chips.appendChild(c);
  });

  if (show.length===0) {
    scroll.innerHTML = '<div class="slide-empty"><div class="e-icon">🎉</div><p>這個分類沒有錯題</p></div>';
    return;
  }

  var maxDots = Math.min(show.length, 7);
  for (var i=0; i<maxDots; i++) {
    var dot = document.createElement('div');
    dot.className = 'pdot'+(i===0?' active':'');
    dots.appendChild(dot);
  }

  show.forEach(function(q, idx) {
    var slide = document.createElement('div');
    slide.className = 'slide';
    slide.style.background = getSlideGradient(idx);
    var card = document.createElement('div');
    card.className = 'slide-card';
    var num = document.createElement('div');
    num.className = 'slide-num';
    num.textContent = (idx+1)+' / '+show.length;
    card.appendChild(num);
    var badge = document.createElement('div');
    badge.className = 'slide-badge '+(q.done?'done':'pending');
    badge.textContent = q.done?'✓ 已複習':'⏳ 待複習';
    card.appendChild(badge);
    if (q.photo) {
      var img = document.createElement('img');
      img.className = 'slide-img'; img.src = q.photo;
      card.appendChild(img);
    }
    var titleEl = document.createElement('div');
    titleEl.className = 'slide-title'; titleEl.textContent = q.title;
    card.appendChild(titleEl);
    if (q.desc) {
      var descEl = document.createElement('div');
      descEl.className = 'slide-desc'; descEl.textContent = q.desc;
      card.appendChild(descEl);
    }
    var footer = document.createElement('div');
    footer.className = 'slide-footer';
    var dateEl = document.createElement('span');
    dateEl.className = 'slide-date'; dateEl.textContent = '📅 '+q.date;
    footer.appendChild(dateEl);
    var markBtn = document.createElement('button');
    markBtn.className = 'slide-mark '+(q.done?'done':'pending');
    markBtn.textContent = q.done?'✓ 已完成':'標記已複習';
    if (!q.done) {
      markBtn.onclick = function() {
        q.done=true; vib(30);
        markBtn.textContent='✓ 已完成'; markBtn.className='slide-mark done';
        badge.textContent='✓ 已複習'; badge.className='slide-badge done';
        toast('✅ 已標記完成！');
      };
    }
    footer.appendChild(markBtn);
    card.appendChild(footer);
    slide.appendChild(card);
    scroll.appendChild(slide);
  });

  var lastIdx = 0;
  scroll.onscroll = null;
  scroll.addEventListener('scroll', function() {
    var h = scroll.clientHeight; if (!h) return;
    var idx = Math.round(scroll.scrollTop/h);
    if (idx!==lastIdx) {
      vib(15); lastIdx=idx;
      dots.querySelectorAll('.pdot').forEach(function(d,i){ d.classList.toggle('active',i===Math.min(idx,maxDots-1)); });
    }
  },{passive:true});
}

// ── Google 登入 ──
var CLIENT_ID = '454122098066-darscenpm003ajoq5vu5720ir2gocot8.apps.googleusercontent.com';
var currentUser = null;

function initGoogle() {
  if (window.google && google.accounts) {
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onLogin });
  } else {
    setTimeout(initGoogle, 300);
  }
}
initGoogle();

function doLogin() {
  if (!window.google || !google.accounts) { toast('Google 載入中，請稍後再試'); return; }
  google.accounts.id.prompt(function(n) {
    if (n.isNotDisplayed() || n.isSkippedMoment()) {
      toast('⚠️ 請上傳到 GitHub Pages 後再登入');
    }
  });
}

function onLogin(response) {
  var b64  = response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  var data = JSON.parse(decodeURIComponent(atob(b64).split('').map(function(c){
    return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
  }).join('')));
  currentUser = { name: data.name, email: data.email, avatar: data.picture };

  var html = '<img src="'+data.picture+'"/> '+data.name.split(' ')[0];

  var b1 = document.getElementById('subj-login-btn');
  if (b1) { b1.innerHTML = html; b1.onclick = null; }

  var b2 = document.getElementById('dash-login-btn');
  if (b2) { b2.innerHTML = html; b2.onclick = null; }

  document.getElementById('dash-title').textContent = '嗨，'+data.name.split(' ')[0]+' 👋';
  toast('✅ 已登入：'+data.name);
}

// ── 24小時重置 ──
function checkReset() {
  var last = localStorage.getItem('lastReset');
  var now  = Date.now();
  if (!last || now-parseInt(last) >= 86400000) {
    var n=0; questions.forEach(function(q){ if(q.done){q.done=false;n++;} });
    localStorage.setItem('lastReset', now.toString());
    if (n>0) toast('🔄 已將 '+n+' 題重置為待複習！');
  }
}
checkReset();
setInterval(checkReset, 60000);
